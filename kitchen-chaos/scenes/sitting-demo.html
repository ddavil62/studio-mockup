<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>손님 앉기 데모 — 앉은 스프라이트</title>
<style>
  body { background: #1a1a2e; color: #eee; font-family: sans-serif; margin: 0; padding: 16px; }
  h2 { text-align: center; margin: 0 0 6px; font-size: 16px; }
  .subtitle { text-align: center; font-size: 12px; color: #aaa; margin-bottom: 14px; }
  .main { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
  .panel { background: #2a2a3e; border-radius: 8px; padding: 12px; text-align: center; }
  .panel h3 { font-size: 13px; margin: 0 0 4px; color: #f0c040; }
  .panel p  { font-size: 11px; color: #aaa; margin: 0 0 8px; max-width: 200px; line-height: 1.4; }
  canvas { display: block; border: 1px solid #444; border-radius: 4px; }
  .controls { text-align: center; margin: 14px 0; }
  button {
    background: #f0c040; color: #1a1a2e; border: none; border-radius: 6px;
    padding: 10px 24px; font-size: 14px; font-weight: bold; cursor: pointer; margin: 4px;
  }
  button:hover { background: #ffd860; }
  .opt-btn { background: #3a3a5e; color: #eee; font-size: 11px; padding: 5px 10px; border-radius: 4px; }
  .opt-btn.active { background: #f0c040; color: #1a1a2e; }
  .sprites { display: flex; gap: 12px; justify-content: center; margin-top: 12px; }
  .sprite-box { background: #2a2a3e; border-radius: 6px; padding: 8px; text-align: center; }
  .sprite-box p { font-size: 10px; color: #888; margin: 4px 0 0; }
  img.sprite-preview { image-rendering: pixelated; border: 1px solid #444; }
</style>
</head>
<body>
<h2>손님 앉기 데모</h2>
<p class="subtitle">앉은 스프라이트를 사용한 테이블 렌더링</p>

<div class="controls">
  <button onclick="toggleSitting()">손님 <span id="toggleLabel">입장</span></button>
  <span style="margin: 0 8px; font-size:12px; color:#888;">레벨:</span>
  <button class="opt-btn active" onclick="setLevel(0)">Lv0</button>
  <button class="opt-btn" onclick="setLevel(1)">Lv1</button>
  <button class="opt-btn" onclick="setLevel(2)">Lv2</button>
  <button class="opt-btn" onclick="setLevel(3)">Lv3</button>
  <button class="opt-btn" onclick="setLevel(4)">Lv4</button>
</div>

<div class="main">
  <!-- 메인 데모 캔버스 -->
  <div class="panel">
    <h3>4석 테이블 씬</h3>
    <p>실제 게임과 동일한 아이소메트릭 2×2 레이아웃</p>
    <canvas id="mainCanvas" width="360" height="280"></canvas>
  </div>

  <!-- 단일 테이블 클로즈업 -->
  <div class="panel">
    <h3>클로즈업</h3>
    <p>단일 테이블 확대 뷰. 손님이 의자에 앉은 모습</p>
    <canvas id="zoomCanvas" width="180" height="200"></canvas>
  </div>
</div>

<!-- 스프라이트 원본 미리보기 -->
<div class="sprites">
  <div class="sprite-box">
    <img class="sprite-preview" id="tablePreview" src="../service/table_lv0.png" width="64" height="64" alt="빈 테이블">
    <p id="tablePreviewLabel">table_lv0<br>(빈 테이블)</p>
  </div>
  <div class="sprite-box">
    <img class="sprite-preview" id="occupiedPreview" src="../service/table_lv0_occupied.png" width="64" height="64" alt="손님 있는 테이블">
    <p id="occupiedPreviewLabel">table_lv0_occupied<br>(손님 있음)</p>
  </div>
</div>

<script>
const IMGS = {};
let sitting = false;
let level = 0;
let loaded = 0;
const TOTAL = 10; // table0~4 + occupied0~4

function loadImg(key, src) {
  const img = new Image();
  img.onload = () => { IMGS[key] = img; loaded++; if (loaded >= TOTAL) drawAll(); };
  img.onerror = () => { loaded++; if (loaded >= TOTAL) drawAll(); };
  img.src = src;
}

for (let i = 0; i <= 4; i++) loadImg(`table${i}`, `../service/table_lv${i}.png`);
for (let i = 0; i <= 4; i++) loadImg(`occupied${i}`, `../service/table_lv${i}_occupied.png`);

// ─── 아이소메트릭 레이아웃 상수 (실제 게임과 동일) ───
const SISO_COLS   = 4;
const SISO_ROWS   = 2;
const HALF_W      = 40;
const HALF_H      = 30;
const ORIGIN_X    = 140;
const ORIGIN_Y    = 120;
const TABLE_DW    = 72;
const TABLE_DH    = 56;

function cellToWorld(col, row) {
  return {
    x: ORIGIN_X + (col - row) * HALF_W,
    y: ORIGIN_Y + (col + row) * HALF_H,
  };
}

// ─── 바닥 격자 ───
function drawFloor(ctx, w, h) {
  ctx.fillStyle = '#c8a87a';
  ctx.fillRect(0, 0, w, h);
  // 헤링본 패턴 시뮬레이션
  ctx.strokeStyle = 'rgba(0,0,0,0.07)';
  ctx.lineWidth = 0.5;
  const ts = 14;
  for (let y = 0; y < h; y += ts)
    for (let x = 0; x < w; x += ts)
      ctx.strokeRect(x, y, ts, ts);
}

// ─── 테이블 1개 그리기 ───
// custImg: customer_sitting.png (person+table 합성 high top-down 스프라이트)
function drawOneTable(ctx, cx, cy, tblImg, custImg) {
  const TW = TABLE_DW, TH = TABLE_DH;

  if (!custImg) {
    // 빈 테이블
    if (tblImg) ctx.drawImage(tblImg, cx - TW/2, cy - TH, TW, TH);
    return;
  }

  // 앉은 손님: customer_sitting.png는 사람+테이블 합성 스프라이트 (high top-down)
  // 테이블 위치에 맞게 중앙 정렬하여 교체 표시
  const SW = custImg.width  * 1.6;
  const SH = custImg.height * 1.6;
  ctx.drawImage(custImg, cx - SW/2, cy - SH * 0.85, SW, SH);

  // 말풍선
  const bx = cx, by = cy - SH * 0.85 - 6;
  ctx.fillStyle = 'rgba(255,220,60,0.92)';
  ctx.beginPath(); roundRect(ctx, bx - 22, by - 18, 44, 16, 4); ctx.fill();
  ctx.fillStyle = '#333';
  ctx.font = '8px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('😋 주문할게요!', bx, by - 6);
}

// ─── 메인 씬: 4석(2×4) 아이소메트릭 ───
function drawMain() {
  const canvas = document.getElementById('mainCanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 360, 280);
  drawFloor(ctx, 360, 280);

  const tbl = IMGS[`table${level}`];
  const cst = sitting ? IMGS[`occupied${level}`] : null;

  // 깊이순 정렬: row 오름차순, 같은 row는 col 오름차순
  const cells = [];
  for (let row = 0; row < SISO_ROWS; row++)
    for (let col = 0; col < SISO_COLS; col++)
      cells.push({ row, col, ...cellToWorld(col, row) });
  cells.sort((a, b) => a.y - b.y || a.x - b.x);

  for (const { x, y } of cells) {
    drawOneTable(ctx, x, y, tbl, cst);
  }
}

// ─── 클로즈업 씬 ───
function drawZoom() {
  const canvas = document.getElementById('zoomCanvas');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 180, 200);
  drawFloor(ctx, 180, 200);

  const tbl = IMGS[`table${level}`];
  const cst = sitting ? IMGS[`occupied${level}`] : null;

  // 중앙 1개 테이블, 2배 확대
  ctx.save();
  ctx.translate(90, 100);
  ctx.scale(1.8, 1.8);
  drawOneTable(ctx, 0, 0, tbl, cst);
  ctx.restore();
}

function drawAll() {
  drawMain();
  drawZoom();
}

// ─── 컨트롤 ───
function toggleSitting() {
  sitting = !sitting;
  document.getElementById('toggleLabel').textContent = sitting ? '퇴장' : '입장';
  drawAll();
}

function setLevel(lv) {
  level = lv;
  document.querySelectorAll('.opt-btn').forEach((b, i) => {
    if (i < 5) b.classList.toggle('active', i === lv);
  });
  document.getElementById('tablePreview').src = `../service/table_lv${lv}.png`;
  document.getElementById('tablePreviewLabel').textContent = `table_lv${lv}\n(빈 테이블)`;
  document.getElementById('occupiedPreview').src = `../service/table_lv${lv}_occupied.png`;
  document.getElementById('occupiedPreviewLabel').textContent = `table_lv${lv}_occupied\n(손님 있음)`;
  drawAll();
}

// roundRect 헬퍼
function roundRect(ctx, x, y, w, h, r) {
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}
</script>
</body>
</html>
