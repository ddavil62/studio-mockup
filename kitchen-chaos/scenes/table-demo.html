<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>테이블 앉기 방식 비교 데모</title>
<style>
  body { background: #1a1a2e; color: #eee; font-family: sans-serif; margin: 0; padding: 16px; }
  h2 { text-align: center; margin: 0 0 8px; font-size: 16px; }
  .subtitle { text-align: center; font-size: 12px; color: #aaa; margin-bottom: 16px; }
  .panels { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .panel { background: #2a2a3e; border-radius: 8px; padding: 12px; text-align: center; }
  .panel h3 { font-size: 13px; margin: 0 0 4px; color: #f0c040; }
  .panel p { font-size: 11px; color: #aaa; margin: 0 0 8px; line-height: 1.4; max-width: 160px; }
  canvas { display: block; border: 1px solid #444; border-radius: 4px; }
  .controls { text-align: center; margin-top: 16px; }
  button {
    background: #f0c040; color: #1a1a2e; border: none; border-radius: 6px;
    padding: 10px 24px; font-size: 14px; font-weight: bold; cursor: pointer;
    margin: 4px;
  }
  button:hover { background: #ffd860; }
  .level-btn {
    background: #3a3a5e; color: #eee; font-size: 12px; padding: 6px 12px;
  }
  .level-btn.active { background: #f0c040; color: #1a1a2e; }
  .verdict { text-align: center; margin-top: 12px; font-size: 12px; color: #888; }
</style>
</head>
<body>
<h2>테이블 앉기 방식 비교 데모</h2>
<p class="subtitle">세 가지 구현 방식의 시각적 차이를 비교합니다</p>

<div style="text-align:center; margin-bottom:12px;">
  <button onclick="toggleSitting()">손님 <span id="toggleLabel">입장</span></button>
  <span style="margin: 0 8px; color:#888; font-size:12px;">테이블 레벨:</span>
  <button class="level-btn active" onclick="setLevel(0)">Lv0</button>
  <button class="level-btn" onclick="setLevel(1)">Lv1</button>
  <button class="level-btn" onclick="setLevel(2)">Lv2</button>
  <button class="level-btn" onclick="setLevel(3)">Lv3</button>
  <button class="level-btn" onclick="setLevel(4)">Lv4</button>
</div>

<div class="panels">
  <div class="panel">
    <h3>A. 현재 방식</h3>
    <p>테이블+의자 일체형 스프라이트.<br>손님은 테이블 위에 부유.</p>
    <canvas id="canvasA" width="160" height="200"></canvas>
  </div>
  <div class="panel">
    <h3>B. 깊이 분할</h3>
    <p>테이블 상단 → 손님 → 테이블 하단 순으로 그림. 손님 하반신이 테이블 앞면에 가려짐.</p>
    <canvas id="canvasB" width="160" height="200"></canvas>
  </div>
  <div class="panel">
    <h3>C. 앞쪽 배치</h3>
    <p>테이블은 뒤, 손님은 앞에 배치.<br>의자 없는 테이블 에셋 필요.</p>
    <canvas id="canvasC" width="160" height="200"></canvas>
  </div>
</div>

<div class="verdict">
  ★ 추천: <strong style="color:#f0c040">B 방식</strong> — 실제 레스토랑 타이쿤 게임들이 사용하는 표준 기법
</div>

<script>
const IMGS = {};
let sitting = false;
let level = 0;
let loaded = 0;
const TOTAL = 6; // table_lv0~4 + customer_normal

// 이미지 로드
function loadImage(key, src) {
  const img = new Image();
  img.onload = () => { IMGS[key] = img; loaded++; if (loaded >= TOTAL) drawAll(); };
  img.onerror = () => { loaded++; if (loaded >= TOTAL) drawAll(); };
  img.src = src;
}

for (let i = 0; i <= 4; i++) loadImage(`table${i}`, `../service/table_lv${i}.png`);
loadImage('customer', '../service/customer_normal.png');

function drawAll() {
  drawA(); drawB(); drawC();
}

// 아이소메트릭 테이블 그리기 헬퍼
// cx, cy = 캔버스 중앙 기준 테이블 스프라이트 앵커 (스프라이트 하단 중앙)
function drawTable(ctx, img, cx, cy, w, h) {
  if (!img) return;
  ctx.drawImage(img, cx - w/2, cy - h, w, h);
}

// 손님 그리기 헬퍼
function drawCustomer(ctx, img, cx, cy, scale) {
  if (!img) return;
  const cw = img.width * scale;
  const ch = img.height * scale;
  ctx.drawImage(img, cx - cw/2, cy - ch, cw, ch);
}

// ─── Panel A: 현재 방식 ───
function drawA() {
  const canvas = document.getElementById('canvasA');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 160, 200);

  // 바닥 배경
  ctx.fillStyle = '#c8a87a';
  ctx.fillRect(0, 0, 160, 200);
  drawFloorPattern(ctx, 160, 200);

  const tbl = IMGS[`table${level}`];
  const cst = IMGS['customer'];

  const TW = 96, TH = 80; // 테이블 표시 크기
  const cx = 80, cy = 130;

  // 테이블 (일체형)
  drawTable(ctx, tbl, cx, cy, TW, TH);

  if (sitting && cst) {
    // 손님: 테이블 위에 부유
    const scale = 1.0;
    const cw = cst.width * scale;
    const ch = cst.height * scale;
    ctx.drawImage(cst, cx - cw/2, cy - TH - ch + 8, cw, ch);
    // 말풍선
    ctx.fillStyle = 'rgba(255,220,80,0.9)';
    ctx.beginPath();
    ctx.roundRect(cx - 20, cy - TH - 60, 40, 20, 4);
    ctx.fill();
    ctx.fillStyle = '#333';
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('😊 앉는중?', cx, cy - TH - 46);
  }

  drawLabel(ctx, 'A: 현재 방식', 80, 190, sitting ? '손님 부유 중' : '빈 테이블');
}

// ─── Panel B: 깊이 분할 ───
function drawB() {
  const canvas = document.getElementById('canvasB');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 160, 200);

  ctx.fillStyle = '#c8a87a';
  ctx.fillRect(0, 0, 160, 200);
  drawFloorPattern(ctx, 160, 200);

  const tbl = IMGS[`table${level}`];
  const cst = IMGS['customer'];

  const TW = 96, TH = 80;
  const cx = 80, cy = 130;
  const splitY = cy - TH * 0.45; // 테이블 앞면/뒷면 분할선 (약 45% 지점)

  if (!sitting || !cst) {
    // 손님 없을 때: 테이블 전체 그리기
    drawTable(ctx, tbl, cx, cy, TW, TH);
  } else {
    // 1단계: 테이블 상단부 (뒷면)만 클리핑
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, 0, 160, splitY);
    ctx.clip();
    drawTable(ctx, tbl, cx, cy, TW, TH);
    ctx.restore();

    // 2단계: 손님 그리기 (전체)
    const scale = 1.0;
    const cw = cst.width * scale;
    const ch = cst.height * scale;
    // 손님 위치: 테이블 중앙, 테이블 상단 근처
    const custY = splitY + ch * 0.5; // 손님 발이 분할선 근처에 오도록
    ctx.drawImage(cst, cx - cw/2, custY - ch, cw, ch);

    // 3단계: 테이블 하단부 (앞면)만 클리핑 - 손님 하반신 가리기
    ctx.save();
    ctx.beginPath();
    ctx.rect(0, splitY, 160, 200 - splitY);
    ctx.clip();
    drawTable(ctx, tbl, cx, cy, TW, TH);
    ctx.restore();

    // 말풍선 (테이블 위)
    ctx.fillStyle = 'rgba(255,220,80,0.9)';
    ctx.beginPath();
    ctx.roundRect(cx - 22, cy - TH - 30, 44, 20, 4);
    ctx.fill();
    ctx.fillStyle = '#333';
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('😋 맛있다!', cx, cy - TH - 16);
  }

  drawLabel(ctx, 'B: 깊이 분할', 80, 190, sitting ? '하반신 가려짐 ✓' : '빈 테이블');
}

// ─── Panel C: 앞쪽 배치 ───
function drawC() {
  const canvas = document.getElementById('canvasC');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 160, 200);

  ctx.fillStyle = '#c8a87a';
  ctx.fillRect(0, 0, 160, 200);
  drawFloorPattern(ctx, 160, 200);

  const tbl = IMGS[`table${level}`];
  const cst = IMGS['customer'];

  const TW = 96, TH = 80;
  const cx = 80;
  // 테이블을 약간 위로 (뒤에 있는 것처럼)
  const tblCy = 115;

  // 테이블 먼저
  drawTable(ctx, tbl, cx, tblCy, TW, TH);

  if (sitting && cst) {
    // 손님: 테이블보다 아래(앞)에 배치
    const scale = 1.0;
    const cw = cst.width * scale;
    const ch = cst.height * scale;
    const custY = tblCy + 10; // 테이블보다 약간 아래 = 아이소메트릭상 앞쪽
    ctx.drawImage(cst, cx - cw/2, custY - ch, cw, ch);

    // 말풍선
    ctx.fillStyle = 'rgba(255,220,80,0.9)';
    ctx.beginPath();
    ctx.roundRect(cx - 22, custY - ch - 28, 44, 20, 4);
    ctx.fill();
    ctx.fillStyle = '#333';
    ctx.font = '9px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('🍽 주문할게요', cx, custY - ch - 14);
  }

  drawLabel(ctx, 'C: 앞쪽 배치', 80, 190, sitting ? '손님 앞에 서있음' : '빈 테이블');
}

// ─── 바닥 헤링본 패턴 ───
function drawFloorPattern(ctx, w, h) {
  ctx.strokeStyle = 'rgba(0,0,0,0.08)';
  ctx.lineWidth = 0.5;
  const ts = 16;
  for (let y = 0; y < h; y += ts) {
    for (let x = 0; x < w; x += ts) {
      ctx.strokeRect(x, y, ts, ts);
    }
  }
}

// ─── 레이블 ───
function drawLabel(ctx, title, x, y, status) {
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(0, y - 12, 160, 20);
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 10px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText(status, x, y + 2);
}

// ─── 컨트롤 ───
function toggleSitting() {
  sitting = !sitting;
  document.getElementById('toggleLabel').textContent = sitting ? '퇴장' : '입장';
  drawAll();
}

function setLevel(lv) {
  level = lv;
  document.querySelectorAll('.level-btn').forEach((b, i) => {
    b.classList.toggle('active', i === lv);
  });
  drawAll();
}

// roundRect polyfill
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    this.beginPath();
    this.moveTo(x + r, y);
    this.lineTo(x + w - r, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r);
    this.lineTo(x + w, y + h - r);
    this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    this.lineTo(x + r, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r);
    this.lineTo(x, y + r);
    this.quadraticCurveTo(x, y, x + r, y);
    this.closePath();
  };
}
</script>
</body>
</html>
