<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitchen Chaos - Ingredients</title>
  <link rel="stylesheet" href="../../shared/style.css">
  <style>
    .ingredient-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 12px;
    }
    .ingredient-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      text-align: center;
      transition: border-color 0.2s;
    }
    .ingredient-card:hover { border-color: #ff6b35; }
    .ingredient-card img {
      image-rendering: pixelated;
      width: 96px;
      height: 96px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg-secondary);
    }
    .ingredient-card .name {
      margin-top: 8px;
      font-size: 0.85rem;
      font-weight: 600;
    }
    .ingredient-card .name-en {
      font-size: 0.7rem;
      color: var(--text-muted);
    }
    .chapter-badge {
      display: inline-block;
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 0.65rem;
      margin-top: 4px;
    }
    .ch1 { background: rgba(100,200,100,0.15); color: #6ac86a; }
    .ch2 { background: rgba(200,150,50,0.15); color: #c89632; }
    .ch3 { background: rgba(75,150,255,0.15); color: #4b96ff; }
    .ch4 { background: rgba(255,100,50,0.15); color: #ff6432; }
    .ch9 { background: rgba(100,150,180,0.15); color: #6496b4; }
  </style>
</head>
<body>
  <header class="page-header">
    <h1 style="color: #ff6b35;">Kitchen Chaos</h1>
    <div class="breadcrumb">
      <a href="../../index.html">Studio</a> / <a href="../index.html">Kitchen Chaos</a> / Ingredients
    </div>
  </header>

  <nav class="sidebar">
    <div class="section-title">Pages</div>
    <a href="../index.html">Overview</a>
    <a href="../enemies/index.html">Enemies</a>
    <a href="../towers/index.html">Towers</a>
    <a href="../chefs/index.html">Chefs</a>
    <a href="../tilesets/index.html">Tilesets</a>
    <a href="index.html" class="active">Ingredients</a>
  </nav>

  <main class="content">
    <h2>Ingredients (20)</h2>
    <p class="text-muted" style="font-size: 0.85rem; margin-bottom: 20px;">32x32 isometric pixel art icons</p>

    <div class="ingredient-grid" id="grid"></div>
  </main>

  <script>
    const INGREDIENTS = [
      { id: 'carrot', ko: '당근', en: 'Carrot', ch: 'ch1' },
      { id: 'meat', ko: '고기', en: 'Meat', ch: 'ch1' },
      { id: 'octopus', ko: '오징어', en: 'Octopus', ch: 'ch1' },
      { id: 'chili', ko: '고추', en: 'Chili', ch: 'ch1' },
      { id: 'cheese', ko: '치즈', en: 'Cheese', ch: 'ch1' },
      { id: 'flour', ko: '밀가루', en: 'Flour', ch: 'ch2' },
      { id: 'egg', ko: '달걀', en: 'Egg', ch: 'ch2' },
      { id: 'rice', ko: '쌀', en: 'Rice', ch: 'ch2' },
      { id: 'fish', ko: '생선', en: 'Fish', ch: 'ch3' },
      { id: 'mushroom', ko: '버섯', en: 'Mushroom', ch: 'ch3' },
      { id: 'shrimp', ko: '새우', en: 'Shrimp', ch: 'ch3' },
      { id: 'tomato', ko: '토마토', en: 'Tomato', ch: 'ch3' },
      { id: 'butter', ko: '버터', en: 'Butter', ch: 'ch3' },
      { id: 'sugar', ko: '설탕', en: 'Sugar', ch: 'ch4' },
      { id: 'milk', ko: '우유', en: 'Milk', ch: 'ch4' },
      { id: 'sashimi_tuna', ko: '참치 사시미', en: 'Sashimi Tuna', ch: 'ch7' },
      { id: 'wasabi', ko: '와사비', en: 'Wasabi', ch: 'ch7' },
      { id: 'tofu', ko: '두부', en: 'Tofu', ch: 'ch8' },
      { id: 'cilantro', ko: '고수', en: 'Cilantro', ch: 'ch8' },
      { id: 'herb_bundle', ko: '허브 번들', en: 'Herb Bundle', ch: 'ch9' },
    ];

    const chLabels = { ch1: '1장', ch2: '2장', ch3: '3장', ch4: '4장', ch7: '7장', ch8: '8장', ch9: '9장' };
    const grid = document.getElementById('grid');

    INGREDIENTS.forEach(i => {
      grid.insertAdjacentHTML('beforeend', `
        <div class="ingredient-card">
          <img src="../assets/ingredients/${i.id}.png" alt="${i.ko}">
          <div class="name">${i.ko}</div>
          <div class="name-en">${i.en}</div>
          <span class="chapter-badge ${i.ch}">${chLabels[i.ch]}</span>
        </div>`);
    });
  </script>
</body>
</html>
