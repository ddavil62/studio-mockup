          <div>

            <span class="dialogue-trigger">${s.trigger}</span>

        </div>
        <div class="dialogue-body" data-id="${s.id}">
          <em style="color:var(--text-muted);font-size:0.8rem;">Loading...</em>
        </div>`;
      return card;

          const label = document.createElement('div');
          label.className = 'sub-group-title';
          label.textContent = sg.label;
          section.appendChild(label);
          sg.scripts.forEach(s => {
            totalLines += s.lines;

          });
        });
      } else {
        ch.scripts.forEach(s => {
          totalLines += s.lines;
          section.appendChild(createCard(s));
